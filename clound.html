<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Cloud</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background: linear-gradient(to top, #87CEEB, #e6f7ff);
        font-family: Arial, sans-serif;
    }

    .cloud-box{
        background:white;
        padding:40px 60px;
        border-radius:20px;
        box-shadow:0 10px 25px rgba(0,0,0,0.15);
        text-align:center;
    }

    h1{
        margin:0;
        color:#333;
        font-size:40px;
    }

    p{
        margin-top:10px;
        font-size:20px;
        color:#555;
    }
</style>

</head>

<body>

<div class="cloud-box">
    <h1>Diwash ☁️</h1>
    <p>This is my cloud</p>
</div>

</body>
</html>
